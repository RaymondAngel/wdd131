<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Raymond Amande">
    <meta name="description" content="A WDD 131 practice page demonstrating responsive images.">
    <title>Responsive Images | Raymond Amande</title>
    <link rel="stylesheet" href="styles/responsive-images.css">
</head>
<body>
    <header>
        <h1>Responsive Images</h1>
    </header>
    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
                <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
                <img src="images/hero-small.webp" alt="Alabang Philippines Temple beneath a blue sky" width="1500" height="750">
            </picture>
        </div>
    </main>
    <footer>
        <p>&copy; Raymond Amande</p>
    </footer>
</body>
</html>
