<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A WDD 131 activity demonstrating JavaScript filter, map, and reduce array methods.">
    <meta name="author" content="Raymond Amande">
    <title>JavaScript Array Methods | Raymond Amande</title>
    <link rel="stylesheet" href="styles/array-methods.css">
    <script src="scripts/array-methods.js" defer></script>
</head>
<body>
    <main>
        <h1>JavaScript Array Methods</h1>
        <p>
            The following results demonstrate how <code>filter()</code>,
            <code>map()</code>, and <code>reduce()</code> transform an array.
        </p>

        <section aria-labelledby="starting-array-heading">
            <h2 id="starting-array-heading">Starting Array</h2>
            <output id="namesOutput"></output>
        </section>

        <section aria-labelledby="filter-heading">
            <h2 id="filter-heading"><code>filter()</code></h2>
            <p>Names beginning with the letter B:</p>
            <output id="filterOutput"></output>
        </section>

        <section aria-labelledby="map-heading">
            <h2 id="map-heading"><code>map()</code></h2>
            <p>Length of each name:</p>
            <output id="mapOutput"></output>
        </section>

        <section aria-labelledby="reduce-heading">
            <h2 id="reduce-heading"><code>reduce()</code></h2>
            <p>Average name length:</p>
            <output id="reduceOutput"></output>
        </section>
    </main>
</body>
</html>
