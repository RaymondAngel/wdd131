<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A WDD 131 activity demonstrating JavaScript objects and dynamic table rendering.">
    <meta name="author" content="Raymond Amande">
    <title>JavaScript Objects | Raymond Amande</title>
    <link rel="stylesheet" href="styles/objects.css">
    <script src="scripts/objects.js" defer></script>
</head>
<body>
    <main>
        <h1>JavaScript Objects</h1>

        <div class="table-container">
            <table id="sections">
                <caption id="courseName"></caption>
                <thead>
                    <tr>
                        <th scope="col">Section</th>
                        <th scope="col">Enrollment</th>
                        <th scope="col">Instructor</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </main>
</body>
</html>
