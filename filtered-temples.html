<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Raymond Amande">
    <meta name="description" content="Explore and filter a responsive album of temples by dedication year and floor area.">
    <title>Filtered Temple Album | Raymond Amande</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/filtered-temples.css">
    <link rel="stylesheet" href="styles/filtered-temples-large.css">
    <script src="scripts/filtered-temples.js" defer></script>
</head>
<body>
    <header>
        <span class="site-title">Temple Album</span>
        <button id="menu" type="button" aria-label="Open navigation menu"
                aria-expanded="false" aria-controls="navigation">
            <span class="menu-open-icon" aria-hidden="true">☰</span>
            <span class="menu-close-icon" aria-hidden="true">✕</span>
        </button>
        <nav id="navigation" aria-label="Filter temples">
            <a id="home" class="filter-link active" href="#home"
               data-filter="home" aria-current="page">Home</a>
            <a id="old" class="filter-link" href="#old"
               data-filter="old">Old</a>
            <a id="new" class="filter-link" href="#new"
               data-filter="new">New</a>
            <a id="large" class="filter-link" href="#large"
               data-filter="large">Large</a>
            <a id="small" class="filter-link" href="#small"
               data-filter="small">Small</a>
        </nav>
    </header>

    <main>
        <h1 id="album-title">All Temples</h1>
        <p id="filter-status" class="visually-hidden" aria-live="polite"></p>
        <section id="temple-cards" class="temple-gallery"
                 aria-labelledby="album-title"></section>
    </main>

    <footer>
        <p>&copy; <span id="currentyear"></span> Raymond Amande, California</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
